name: Discord Role Ping

# Run on any push to the main branch
on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"<@&1486366928510386206> New commit pushed by ${{ github.actor }}: ${{ github.event.head_commit.message }}\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
